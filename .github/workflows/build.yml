name: Build mythicos-upgrade-info

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Debian build tools
        run: |
          sudo apt update
          sudo apt install -y \
            devscripts \
            debhelper \
            fakeroot \
            build-essential

      - name: Prepare build directory
        run: |
          mkdir build
          cp -r * build/

      - name: Build package
        run: |
          cd build
          dpkg-buildpackage -us -uc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mythicos-upgrade-info-build
          path: |
            build/*.deb
            build/*.changes
            build/*.buildinfo
            build/*.dsc
            build/*.tar.*
